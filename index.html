<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf6f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, #fce4ec55 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, #f3e5f555 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, #fff9c455 0%, transparent 40%);
      pointer-events: none;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 2rem 1rem 3rem;
    }

    .hint {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #c9a4a4;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      transition: opacity 0.6s;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.8s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .bouquet-wrap {
      cursor: pointer;
      position: relative;
      z-index: 2;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
    }
    .bouquet-wrap:hover { transform: scale(1.06) rotate(-1deg); }
    .bouquet-wrap:active { transform: scale(0.96); }

    .bouquet-svg {
      width: 220px;
      height: 280px;
      display: block;
      filter: drop-shadow(0 8px 18px rgba(180,100,120,0.18));
    }

    @keyframes popUp {
      0%   { opacity: 0; transform: translateY(12px) scale(0.5); }
      60%  { opacity: 1; transform: translateY(-4px) scale(1.08); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes popUpFlower {
      0%   { opacity: 0; transform: translateY(18px) scale(0.3); }
      65%  { opacity: 1; transform: translateY(-5px) scale(1.1); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .anim-wrap { opacity: 0; }
    .anim-stems  { animation: popUp 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards; }
    .anim-leaves { animation: popUp 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.25s forwards; }
    .anim-wrap-body { animation: popUp 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.35s forwards; }
    .anim-sf-left  { animation: popUpFlower 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.55s forwards; }
    .anim-sf-right { animation: popUpFlower 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.7s forwards; }
    .anim-hyacinth { animation: popUpFlower 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.88s forwards; }

    .letter-wrap {
      position: relative;
      z-index: 1;
      width: 340px;
      max-width: 92vw;
      margin-top: -18px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .letter-wrap.open { max-height: 600px; }

    .letter {
      background: #fffdf8;
      border: 1px solid #f0ddd0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 2rem 2.25rem 1.75rem;
      font-family: 'Cormorant Garamond', serif;
      color: #3d2b1f;
      font-size: 17px;
      line-height: 1.85;
      transform: translateY(-30px);
      transition: transform 0.9s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 16px 40px rgba(160,80,100,0.1);
    }
    .letter-wrap.open .letter { transform: translateY(0); }

    .letter-date {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #c9a4a4;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .letter p { margin-bottom: 1rem; }
    .letter p:last-of-type { margin-bottom: 0; }
    .letter .sign { font-style: italic; color: #b07070; }

    .close-btn {
      display: block;
      margin-top: 1.25rem;
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #c9a4a4;
      text-transform: uppercase;
      cursor: pointer;
      text-align: right;
      background: none;
      border: none;
    }
    .close-btn:hover { color: #a07070; }

    .petal-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .petal {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0;
    }

    @keyframes floatPetal {
      0%   { opacity: 0.9; transform: translate(0,0) rotate(0deg) scale(1); }
      100% { opacity: 0;   transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(0.3); }
    }
  </style>
</head>
<body>

<script>
  let open = false;

  function toggleLetter() {
    open = !open;
    document.getElementById('letter-wrap').classList.toggle('open', open);
    document.getElementById('hint').style.opacity = open ? '0' : '1';
    if (open) burstPetals();
  }

  function burstPetals() {
    const container = document.getElementById('petals');
    container.innerHTML = '';
    const colors = ['#f5c518','#a78bfa','#fde68a','#c4b5fd','#f9c740','#7c3aed','#fef08a','#ddd6fe'];
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.42;
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const size = 8 + Math.random() * 8;
      p.style.cssText = `width:${size}px;height:${size}px;background:${colors[i % colors.length]};left:${cx}px;top:${cy}px;`;
      const angle = (i / 22) * 360;
      const dist = 90 + Math.random() * 130;
      const dx = Math.cos(angle * Math.PI / 180) * dist;
      const dy = Math.sin(angle * Math.PI / 180) * dist - 50;
      p.style.setProperty('--dx', dx + 'px');
      p.style.setProperty('--dy', dy + 'px');
      p.style.setProperty('--dr', (Math.random() * 540 - 270) + 'deg');
      p.style.animation = `floatPetal ${0.7 + Math.random() * 0.7}s ease-out ${Math.random() * 0.15}s forwards`;
      container.appendChild(p);
    }
  }
</script>
