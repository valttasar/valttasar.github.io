<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf6f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, #fce4ec55 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, #f3e5f555 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, #fff9c455 0%, transparent 40%);
      pointer-events: none;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 2rem 1rem 3rem;
    }

    .hint {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #c9a4a4;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      transition: opacity 0.6s;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.9s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
      60%  { opacity: 1; transform: scale(1.12) rotate(3deg); }
      80%  { transform: scale(0.95) rotate(-1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .bouquet-wrap {
      cursor: pointer;
      position: relative;
      z-index: 2;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
    }
    .bouquet-wrap:hover { transform: scale(1.06) rotate(-1deg); }
    .bouquet-wrap:active { transform: scale(0.96); }

    .bouquet-svg {
      width: 210px;
      height: 240px;
      display: block;
      filter: drop-shadow(0 8px 18px rgba(180,100,120,0.18));
    }

    .letter-wrap {
      position: relative;
      z-index: 1;
      width: 340px;
      max-width: 92vw;
      margin-top: -18px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .letter-wrap.open { max-height: 600px; }

    .letter {
      background: #fffdf8;
      border: 1px solid #f0ddd0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 2rem 2.25rem 1.75rem;
      font-family: 'Cormorant Garamond', serif;
      color: #3d2b1f;
      font-size: 17px;
      line-height: 1.85;
      transform: translateY(-30px);
      transition: transform 0.9s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 16px 40px rgba(160,80,100,0.1);
    }
    .letter-wrap.open .letter { transform: translateY(0); }

    .letter-date {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #c9a4a4;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .letter p { margin-bottom: 1rem; }
    .letter p:last-of-type { margin-bottom: 0; }
    .letter .sign { font-style: italic; color: #b07070; }

    .close-btn {
      display: block;
      margin-top: 1.25rem;
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #c9a4a4;
      text-transform: uppercase;
      cursor: pointer;
      text-align: right;
      background: none;
      border: none;
    }
    .close-btn:hover { color: #a07070; }

    .petal-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .petal {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0;
    }

    @keyframes floatPetal {
      0%   { opacity: 0.9; transform: translate(0,0) rotate(0deg) scale(1); }
      100% { opacity: 0;   transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(0.3); }
    }
  </style>
</head>
<body>

<div class="scene">
  <p class="hint" id="hint">tap the bouquet!!!:3333</p>

  <div class="petal-canvas" id="petals"></div>

  <div class="bouquet-wrap" id="bouquet" onclick="toggleLetter()" role="button" aria-label="Open love letter">

      <ellipse cx="127" cy="176" rx="13" ry="6" fill="#7ec850" transform="rotate(35 127 176)"/>
      <ellipse cx="105" cy="172" rx="10" ry="5" fill="#7ec850" transform="rotate(-10 105 172)"/>

      <path d="M78 207 Q105 218 132 207 L128 226 Q105 233 82 226 Z" fill="#f4a7b9" opacity="0.92"/>
      <line x1="105" y1="217" x2="105" y2="231" stroke="#e07090" stroke-width="1.5" stroke-linecap="round"/>

      <g id="sf-left" transform="translate(62,130)">
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(0)"/>

        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(90)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(135)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(180)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(225)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(270)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(315)"/>
        <circle cx="0" cy="0" r="11" fill="#5c3317"/>
        <circle cx="-3" cy="-3" r="1.5" fill="#3d2008" opacity="0.7"/>
        <circle cx="2" cy="-4" r="1.5" fill="#3d2008" opacity="0.7"/>

        <circle cx="3" cy="4" r="1.5" fill="#3d2008" opacity="0.5"/>
        <circle cx="-4" cy="2" r="1.2" fill="#3d2008" opacity="0.5"/>
      </g>

      <g id="sf-right" transform="translate(148,130)">
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(0)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(45)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(90)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(135)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(180)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(225)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(270)"/>
        <ellipse cx="0" cy="-13" rx="6" ry="11" fill="#f5c518" transform="rotate(315)"/>
        <circle cx="0" cy="0" r="11" fill="#5c3317"/>
        <circle cx="-3" cy="-3" r="1.5" fill="#3d2008" opacity="0.7"/>
        <circle cx="2" cy="-4" r="1.5" fill="#3d2008" opacity="0.7"/>
        <circle cx="4" cy="1" r="1.5" fill="#3d2008" opacity="0.7"/>
        <circle cx="-1" cy="3" r="1.5" fill="#3d2008" opacity="0.7"/>
        <circle cx="3" cy="4" r="1.5" fill="#3d2008" opacity="0.5"/>
        <circle cx="-4" cy="2" r="1.2" fill="#3d2008" opacity="0.5"/>
      </g>

      <g id="hyacinth" transform="translate(105,60)">
        <ellipse cx="0" cy="60" rx="7" ry="22" fill="#8b5cf6" opacity="0.25"/>

        <circle cx="-6" cy="74" r="5" fill="#a78bfa"/>
        <circle cx="6" cy="74" r="5" fill="#a78bfa"/>
        <circle cx="0" cy="70" r="5" fill="#c4b5fd"/>

        <circle cx="-8" cy="62" r="5" fill="#8b5cf6"/>
        <circle cx="8" cy="62" r="5" fill="#8b5cf6"/>
        <circle cx="-3" cy="59" r="5" fill="#a78bfa"/>
        <circle cx="3" cy="59" r="5" fill="#a78bfa"/>

        <circle cx="-9" cy="50" r="5" fill="#7c3aed"/>
        <circle cx="9" cy="50" r="5" fill="#7c3aed"/>
        <circle cx="-4" cy="47" r="5" fill="#8b5cf6"/>
        <circle cx="4" cy="47" r="5" fill="#8b5cf6"/>
        <circle cx="0" cy="44" r="5" fill="#a78bfa"/>

        <circle cx="-8" cy="37" r="4.5" fill="#6d28d9"/>
        <circle cx="8" cy="37" r="4.5" fill="#6d28d9"/>
        <circle cx="-3" cy="34" r="4.5" fill="#7c3aed"/>
        <circle cx="3" cy="34" r="4.5" fill="#7c3aed"/>

        <circle cx="-6" cy="24" r="4" fill="#5b21b6"/>
        <circle cx="6" cy="24" r="4" fill="#5b21b6"/>

        <circle cx="2" cy="21" r="4" fill="#6d28d9"/>
        <circle cx="0" cy="18" r="4" fill="#7c3aed"/>

        <circle cx="-4" cy="12" r="3.5" fill="#4c1d95"/>
        <circle cx="4" cy="12" r="3.5" fill="#4c1d95"/>
        <circle cx="0" cy="9" r="3.5" fill="#5b21b6"/>

        <circle cx="-2" cy="4" r="3" fill="#3b0764"/>
        <circle cx="2" cy="4" r="3" fill="#3b0764"/>

        <ellipse cx="0" cy="80" rx="4" ry="8" fill="#5a8a3a"/>
        <ellipse cx="-10" cy="72" rx="3.5" ry="9" fill="#6a9a4a" transform="rotate(-20 -10 72)"/>
        <ellipse cx="10" cy="72" rx="3.5" ry="9" fill="#6a9a4a" transform="rotate(20 10 72)"/>
      </g>

    </svg>
  </div>

  <div class="letter-wrap" id="letter-wrap">
    <div class="letter">
      <div class="letter-date">May aaa, 2026</div>
      <p>Tom</p>
      <button class="close-btn" onclick="toggleLetter()">close ↑</button>
    </div>
  </div>
</div>

<script>
  let open = false;

  function toggleLetter() {
    open = !open;
    document.getElementById('letter-wrap').classList.toggle('open', open);
    document.getElementById('hint').style.opacity = open ? '0' : '1';
    if (open) burstPetals();
  }

  function burstPetals() {
    const container = document.getElementById('petals');
    container.innerHTML = '';
    const colors = ['#f5c518','#a78bfa','#fde68a','#c4b5fd','#f9c740','#7c3aed','#fef08a','#ddd6fe'];
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.42;
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const size = 8 + Math.random() * 8;
      p.style.cssText = `width:${size}px;height:${size}px;background:${colors[i % colors.length]};left:${cx}px;top:${cy}px;`;
      const angle = (i / 22) * 360;
      const dist = 90 + Math.random() * 130;
      const dx = Math.cos(angle * Math.PI / 180) * dist;
      const dy = Math.sin(angle * Math.PI / 180) * dist - 50;
      p.style.setProperty('--dx', dx + 'px');
      p.style.setProperty('--dy', dy + 'px');
      p.style.setProperty('--dr', (Math.random() * 540 - 270) + 'deg');
      p.style.animation = `floatPetal ${0.7 + Math.random() * 0.7}s ease-out ${Math.random() * 0.15}s forwards`;
      container.appendChild(p);
    }
  }
</script>
</body>
</html>
