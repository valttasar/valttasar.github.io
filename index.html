<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Tom 🌸</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf6f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, #fce4ec55 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, #f3e5f555 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, #fff9c455 0%, transparent 40%);
      pointer-events: none;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 2rem 1rem 3rem;
    }

    .hint {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #c9a4a4;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      transition: opacity 0.6s;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.9s forwards;
    }
    .hint.hidden { opacity: 0 !important; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
      60%  { opacity: 1; transform: scale(1.12) rotate(3deg); }
      80%  { transform: scale(0.95) rotate(-1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes clickPop {
      0%   { transform: scale(1); }
      35%  { transform: scale(0.88); }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .bouquet-wrap {
      cursor: pointer;
      position: relative;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
    }
    .bouquet-wrap.clicked .bouquet-img {
      animation: clickPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .bouquet-img {
      width: 340px;
      height: 380px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 8px 18px rgba(180,100,120,0.18));
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .letter-wrap {
      position: relative;
      z-index: 1;
      width: 340px;
      max-width: 92vw;
      margin-top: -18px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .letter-wrap.open { max-height: 600px; }

    .letter {
      background: #fffdf8;
      border: 1px solid #f0ddd0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 2rem 2.25rem 1.75rem;
      font-family: 'Cormorant Garamond', serif;
      color: #3d2b1f;
      font-size: 17px;
      line-height: 1.85;
      transform: translateY(-30px);
      transition: transform 0.9s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 16px 40px rgba(160,80,100,0.1);
    }
    .letter-wrap.open .letter { transform: translateY(0); }

    .letter-date {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #c9a4a4;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .letter p { margin-bottom: 1rem; }
    .letter p:last-of-type { margin-bottom: 0; }
    .letter .sign { font-style: italic; color: #b07070; }

    .close-btn {
      display: block;
      margin-top: 1.25rem;
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #c9a4a4;
      text-transform: uppercase;
      cursor: pointer;
      text-align: right;
      background: none;
      border: none;
    }
    .close-btn:hover { color: #a07070; }

    .ribbon-wrap {
      width: 340px;
      max-width: 92vw;
      display: flex;
      justify-content: flex-end;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .ribbon-wrap.open { max-height: 200px; }

    .ribbon-img {
      width: 80px;
      height: auto;
      object-fit: contain;
      pointer-events: none;
    }

    .petal-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .petal {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0;
    }

    @keyframes floatPetal {
      0%   { opacity: 0.9; transform: translate(0,0) rotate(0deg) scale(1); }
      100% { opacity: 0;   transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(0.3); }
    }
  </style>
</head>
<body>

<div class="scene">
  <p class="hint" id="hint">tap the bouquet (´,,•ω•,,)</p>

  <div class="petal-canvas" id="petals"></div>

  <div class="bouquet-wrap" id="bouquet" onclick="toggleLetter()" role="button" aria-label="Open love letter">
    <img class="bouquet-img" id="bouquet-img" src="assets/bouquet.png" alt="A beautiful bouquet of flowers" />
  </div>

  <div class="letter-wrap" id="letter-wrap">
    <div class="letter">
      <div class="letter-date">May --, 2026</div>
      <p>My dearest Tom,</p>
      <p>/////</p>
      <p class="sign">I labubu you (ɔˆз(ˆ⌣ˆc) ♥</p>
      <button class="close-btn" onclick="toggleLetter()">close ↑</button>
    </div>
  </div>

  <div class="ribbon-wrap" id="ribbon-wrap">
    <img class="ribbon-img" src="assets/ribbon.png" alt="ribbon" />
  </div>
</div>

<script>
  let open = false;

  function toggleLetter() {
    open = !open;
    document.getElementById('letter-wrap').classList.toggle('open', open);
    document.getElementById('ribbon-wrap').classList.toggle('open', open);
    document.getElementById('hint').classList.toggle('hidden', open);

    if (open) burstPetals();

    const bouquet = document.getElementById('bouquet');
    bouquet.classList.remove('clicked');
    void bouquet.offsetWidth;
    bouquet.classList.add('clicked');
    bouquet.addEventListener('animationend', () => bouquet.classList.remove('clicked'), { once: true });
  }

  function burstPetals() {
    const container = document.getElementById('petals');
    container.innerHTML = '';
    const colors = ['#f5c518','#a78bfa','#fde68a','#c4b5fd','#f9c740','#7c3aed','#fef08a','#ddd6fe'];
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.42;
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const size = 8 + Math.random() * 8;
      p.style.cssText = `width:${size}px;height:${size}px;background:${colors[i % colors.length]};left:${cx}px;top:${cy}px;`;
      const angle = (i / 22) * 360;
      const dist = 90 + Math.random() * 130;
      const dx = Math.cos(angle * Math.PI / 180) * dist;
      const dy = Math.sin(angle * Math.PI / 180) * dist - 50;
      p.style.setProperty('--dx', dx + 'px');
      p.style.setProperty('--dy', dy + 'px');
      p.style.setProperty('--dr', (Math.random() * 540 - 270) + 'deg');
      p.style.animation = `floatPetal ${0.7 + Math.random() * 0.7}s ease-out ${Math.random() * 0.15}s forwards`;
      container.appendChild(p);
    }
  }
</script>
</body>
</html>
